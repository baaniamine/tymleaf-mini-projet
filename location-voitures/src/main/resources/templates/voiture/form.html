<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Voiture</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; }
        .container { width: 560px; margin: 35px auto; background: white; padding: 30px; border-radius: 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1e3a8a; margin-bottom: 25px; }
        label { display: block; margin-top: 14px; margin-bottom: 6px; font-weight: bold; }
        input, select { width: 100%; padding: 11px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; margin-top: 22px; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .back-link { display: block; text-align: center; margin-top: 16px; text-decoration: none; color: #1e3a8a; font-weight: bold; }
    </style>
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<div th:replace="fragments/menu :: menu"></div>
<div class="container">
    <h2 th:text="${voiture.id == null} ? 'Ajouter une voiture' : 'Modifier une voiture'"></h2>
    <form th:action="@{/voitures/save}" th:object="${voiture}" method="post">
        <input type="hidden" th:field="*{id}">

        <label>Immatriculation</label>
        <input type="text" th:field="*{immatriculation}" placeholder="Ex: 12345-A-1" required>

        <label>Marque</label>
        <input type="text" th:field="*{marque}" placeholder="Ex: Renault, Dacia..." required>

        <label>Segment</label>
        <select th:field="*{segment}" required>
            <option value="">-- Choisir un segment --</option>
            <option value="citadine">Citadine</option>
            <option value="berline">Berline</option>
            <option value="SUV">SUV</option>
            <option value="utilitaire">Utilitaire</option>
            <option value="monospace">Monospace</option>
        </select>

        <label>Prix par jour (MAD)</label>
        <input type="number" step="0.01" th:field="*{prixJour}" placeholder="Ex: 250.00" required>

        <label>Disponible</label>
        <select th:field="*{disponible}" required>
            <option value="true">Oui</option>
            <option value="false">Non</option>
        </select>

        <button type="submit">Enregistrer</button>
    </form>
    <a class="back-link" th:href="@{/voitures}">← Retour à la liste</a>
</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
