<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Client</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; }
        .container { width: 560px; margin: 35px auto; background: white; padding: 30px; border-radius: 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1e3a8a; margin-bottom: 25px; }
        label { display: block; margin-top: 14px; margin-bottom: 6px; font-weight: bold; }
        input { width: 100%; padding: 11px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; margin-top: 22px; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .back-link { display: block; text-align: center; margin-top: 16px; text-decoration: none; color: #1e3a8a; font-weight: bold; }
    </style>
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<div th:replace="fragments/menu :: menu"></div>
<div class="container">
    <h2 th:text="${client.id == null} ? 'Ajouter un client' : 'Modifier un client'"></h2>
    <form th:action="@{/clients/save}" th:object="${client}" method="post">
        <input type="hidden" th:field="*{id}">

        <label>Nom complet</label>
        <input type="text" th:field="*{nom}" placeholder="Ex: Ahmed Benali" required>

        <label>CIN</label>
        <input type="text" th:field="*{cin}" placeholder="Ex: AB123456" required>

        <label>Téléphone</label>
        <input type="text" th:field="*{telephone}" placeholder="Ex: 0612345678" required>

        <button type="submit">Enregistrer</button>
    </form>
    <a class="back-link" th:href="@{/clients}">← Retour à la liste</a>
</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
